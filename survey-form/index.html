<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <title>Survey form</title>
</head>

<body>
  <div class="container">
  <h1 id="title">Survey Form</h1>
  <p id="description">Lorem ipsum dolor sit amet, consectetur adipisicing elit. <br>
    Voluptatem laborum non, assumenda ducimus in sequi. <br>
    Provident tenetur nemo, ratione quaerat sequi velit? Nesciunt.</p>
  <form action="" id="survey-form">
    <div class="form-element"><br><br>
      <label for="text" id="name-label">Enter your name:</label>
      <input type="text" id="name" name="email" placeholder="John Thopmson" required>
    </div>


    <br><br>
    <div class="form-element">
      <label for="email" id="email-label">Enter your email:</label>
      <input type="email" id="email" name="email" placeholder="example@domain.com" required>
    </div>
    <div class="form-element">
      <br><br>
      <label for="number" id="number-label">Age: <span>(optional)</span></label>
      <input type="number" id="number" name="number" min="13" max="92" placeholder="23" required>
    </div>

    <div class="form-element">
      <br><br>
      <label for="browser">Which is your favorite browser?</label>
    </div>

    <div class="form-element">
      <br>
      <input type="radio" id="Google-Chrome" name="browser" value="Google Chrome">
      <label for="Google-Chrome">Google Chrome</label><br>
      <input type="radio" id="Mozilla-Firefox" name="browser" value="Mozilla Firefox">
      <label for="Mozilla-Firefox">Mozilla Firefox</label><br>
      <input type="radio" id="Opera-GX" name="browser" value="Opera-GX">
      <label for="Opera-GX">Opera GX</label><br>
      <br><br>
    </div>

    <div class="form-element">
      <p>Please select your skill level:</p>
      <select id="dropdown" name="dropdown">
        <option value="beginner">Beginner</option>
        <option value="medium">Medium</option>
        <option value="advanced">Advanced</option>
      </select>
    </div>

    <div class="form-element">
      <p>What do you want to learn?</p>
      <input type="checkbox" id="HTML" name="HTML" value="HTML">
      <label for="HTML">HTML</label><br>
      <input type="checkbox" id="CSS" name="CSS" value="CSS">
      <label for="CSS">CSS</label><br>
      <input type="checkbox" id="Javascript" name="Javascript" value="Javascript">
      <label for="Javascript">Javascript</label><br>
      <input type="checkbox" id="PHP" name="PHP" value="PHP">
      <label for="PHP">PHP</label><br>
      <input type="checkbox" id="mongoDB" name="mongoDB" value="mongoDB">
      <label for="mongoDB">mongoDB</label><br>
      <input type="checkbox" id="reactJS" name="reactJS" value="reactJS">
      <label for="reactJS">reactJS</label><br>
      <input type="checkbox" id="WordPress" name="WordPress" value="WordPress">
      <label for="WordPress">WordPress</label><br>
      <br>
    </div>

    <div class="form-element">
      <label for="message">Your message:</label><br />
      <textarea placeholder="Tell us what you think" id="message" name="message" rows="6" cols="80" style="resize: none; max-width: 95% ;"></textarea>
      <br>
      <button type="submit" id="submit" form="survey-form" value="Submit">Submit</button>
    </div>
  </form>
</div>
</body>

</html>
